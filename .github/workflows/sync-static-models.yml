name: Sync static model snapshot

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-static-models
  cancel-in-progress: false

jobs:
  sync-models:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Refresh static models and pricing page
        run: node scripts/update-static-models.js

      - name: Check for generated changes
        id: diff
        run: |
          if git diff --quiet -- model-search.js overview/pricing.mdx; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated snapshot
        if: steps.diff.outputs.changed == 'true'
        run: |
          git add model-search.js overview/pricing.mdx
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "chore: sync static model snapshot"

      - name: Push updated snapshot
        if: steps.diff.outputs.changed == 'true'
        run: git push origin HEAD:main
