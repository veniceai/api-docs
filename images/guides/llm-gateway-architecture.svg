<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Rust LLM gateway architecture</title>
  <desc id="desc">A client sends an OpenAI-compatible request to a Rust Axum gateway, which checks Postgres for authentication and rate limits, forwards to Venice AI, and exports telemetry.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dd3300" />
    </marker>
    <style>
      .bg { fill: #fff7f3; }
      .local { fill: #ffffff; stroke: #2f4858; stroke-width: 2; rx: 16; }
      .gateway { fill: #ffffff; stroke: #dd3300; stroke-width: 2.5; rx: 18; }
      .store { fill: #ffffff; stroke: #7a6ff0; stroke-width: 2; rx: 16; }
      .title { font: 700 22px Arial, sans-serif; fill: #221b18; }
      .label { font: 700 15px Arial, sans-serif; fill: #221b18; }
      .small { font: 13px Arial, sans-serif; fill: #51443d; }
      .arrow { stroke: #dd3300; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #7a6ff0; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
      .pill { fill: #ffe5dc; stroke: #dd3300; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="520" rx="24" />
  <text class="title" x="40" y="48">Rust LLM Gateway</text>
  <text class="small" x="40" y="76">The gateway keeps provider credentials server-side while enforcing policy and recording telemetry for every request.</text>

  <rect class="local" x="45" y="175" width="165" height="105" />
  <text class="label" x="93" y="213">Client app</text>
  <text class="small" x="75" y="238">Bearer gateway key</text>
  <text class="small" x="70" y="258">OpenAI-compatible JSON</text>

  <rect class="gateway" x="290" y="130" width="245" height="195" />
  <text class="label" x="366" y="164">Rust gateway</text>
  <text class="small" x="330" y="191">Axum router</text>
  <text class="small" x="330" y="214">Auth extractor</text>
  <text class="small" x="330" y="237">Fixed-window limiter</text>
  <text class="small" x="330" y="260">Venice proxy client</text>
  <text class="small" x="330" y="283">SSE stream observer</text>

  <rect class="store" x="315" y="385" width="200" height="80" />
  <text class="label" x="379" y="418">Postgres</text>
  <text class="small" x="348" y="441">Key hashes and limits</text>

  <rect class="local" x="650" y="150" width="190" height="115" />
  <text class="label" x="711" y="188">Venice AI</text>
  <text class="small" x="688" y="212">Chat completions</text>
  <text class="small" x="685" y="235">Streaming responses</text>

  <rect class="store" x="900" y="150" width="180" height="115" />
  <text class="label" x="936" y="188">Telemetry</text>
  <text class="small" x="936" y="212">OpenTelemetry</text>
  <text class="small" x="933" y="235">Billing logs</text>

  <rect class="pill" x="594" y="344" width="260" height="42" />
  <text class="small" x="623" y="370">Provider key stays inside the gateway</text>

  <path class="arrow" d="M210 228 H282" />
  <path class="arrow" d="M535 205 H642" />
  <path class="arrow" d="M650 235 C605 288 574 297 535 290" />
  <path class="muted" d="M415 325 V377" />
  <path class="muted" d="M535 175 C650 78 875 87 960 142" />
  <path class="arrow" d="M290 270 C245 330 211 305 178 282" />
</svg>
