<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Private research agent pipeline</title>
  <desc id="desc">A high-level flow from user topic through query planning, source discovery, scraping, evidence extraction, gap analysis, and final report generation.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dd3300" />
    </marker>
    <style>
      .bg { fill: #fff7f3; }
      .card { fill: #ffffff; stroke: #f0b49f; stroke-width: 2; rx: 16; }
      .local { fill: #fff; stroke: #2f4858; stroke-width: 2; rx: 16; }
      .venice { fill: #fff; stroke: #dd3300; stroke-width: 2; rx: 16; }
      .provider { fill: #fff; stroke: #7a6ff0; stroke-width: 2; rx: 16; }
      .title { font: 700 22px Arial, sans-serif; fill: #221b18; }
      .label { font: 700 15px Arial, sans-serif; fill: #221b18; }
      .small { font: 13px Arial, sans-serif; fill: #51443d; }
      .arrow { stroke: #dd3300; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7a6ff0; stroke-width: 2.5; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .pill { fill: #ffe5dc; stroke: #dd3300; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="520" rx="24" />
  <text class="title" x="40" y="48">Research Agent Pipeline</text>
  <text class="small" x="40" y="76">The local Python app coordinates the workflow while Venice handles model calls and page scraping.</text>

  <rect class="local" x="40" y="120" width="150" height="80" />
  <text class="label" x="68" y="153">User topic</text>
  <text class="small" x="62" y="176">CLI input</text>

  <rect class="venice" x="240" y="110" width="170" height="100" />
  <text class="label" x="270" y="143">Plan queries</text>
  <text class="small" x="265" y="166">Venice chat</text>
  <text class="small" x="263" y="186">JSON query list</text>

  <rect class="provider" x="465" y="110" width="170" height="100" />
  <text class="label" x="497" y="143">Discover</text>
  <text class="small" x="493" y="166">DuckDuckGo</text>
  <text class="small" x="510" y="186">or arXiv</text>

  <rect class="venice" x="690" y="110" width="170" height="100" />
  <text class="label" x="722" y="143">Read pages</text>
  <text class="small" x="724" y="166">Venice scrape</text>
  <text class="small" x="724" y="186">Markdown output</text>

  <rect class="local" x="915" y="110" width="165" height="100" />
  <text class="label" x="946" y="143">Normalize</text>
  <text class="small" x="944" y="166">Canonical URLs</text>
  <text class="small" x="948" y="186">Content hashes</text>

  <rect class="local" x="155" y="300" width="170" height="100" />
  <text class="label" x="200" y="333">Chunk</text>
  <text class="small" x="184" y="356">Split Markdown</text>
  <text class="small" x="188" y="376">with overlap</text>

  <rect class="venice" x="380" y="300" width="180" height="100" />
  <text class="label" x="418" y="333">Extract evidence</text>
  <text class="small" x="421" y="356">Chunk summaries</text>
  <text class="small" x="444" y="376">Quotes</text>

  <rect class="local" x="615" y="300" width="170" height="100" />
  <text class="label" x="655" y="333">Source notes</text>
  <text class="small" x="650" y="356">Stable source IDs</text>
  <text class="small" x="667" y="376">Provenance</text>

  <rect class="venice" x="840" y="300" width="180" height="100" />
  <text class="label" x="878" y="333">Synthesize</text>
  <text class="small" x="873" y="356">Cited report</text>
  <text class="small" x="865" y="376">References section</text>

  <path class="arrow" d="M190 160 H232" />
  <path class="arrow" d="M410 160 H457" />
  <path class="arrow" d="M635 160 H682" />
  <path class="arrow" d="M860 160 H907" />
  <path class="arrow" d="M997 210 C997 255 240 245 240 292" />
  <path class="arrow" d="M325 350 H372" />
  <path class="arrow" d="M560 350 H607" />
  <path class="arrow" d="M785 350 H832" />
  <path class="dash" d="M700 300 C700 250 320 255 320 218" />

  <rect class="pill" x="520" y="242" width="205" height="34" />
  <text class="small" x="539" y="264">Gap analysis creates follow-up queries</text>
</svg>
