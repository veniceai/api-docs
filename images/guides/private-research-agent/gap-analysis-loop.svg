<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Gap analysis and source balancing loop</title>
  <desc id="desc">The research agent reviews source notes and source clusters, identifies missing coverage, writes research gap artifacts, and generates targeted follow-up queries.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dd3300" />
    </marker>
    <style>
      .bg { fill: #f7fbff; }
      .card { fill: #ffffff; stroke: #9eb6c7; stroke-width: 2; rx: 18; }
      .accent { fill: #ffffff; stroke: #dd3300; stroke-width: 2; rx: 18; }
      .artifact { fill: #fff7f3; stroke: #dd3300; stroke-width: 2; rx: 18; }
      .title { font: 700 22px Arial, sans-serif; fill: #1e2a33; }
      .label { font: 700 16px Arial, sans-serif; fill: #1e2a33; }
      .small { font: 13px Arial, sans-serif; fill: #4d5d68; }
      .arrow { stroke: #dd3300; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #7893a7; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="520" rx="24" />
  <text class="title" x="40" y="48">Follow-up Research Uses Gap Analysis</text>
  <text class="small" x="40" y="76">The updated agent checks what the current source set is missing before it asks for another search pass.</text>

  <rect class="card" x="80" y="145" width="190" height="95" />
  <text class="label" x="126" y="178">Source notes</text>
  <text class="small" x="112" y="202">Summaries, quotes,</text>
  <text class="small" x="120" y="222">URLs, and IDs</text>

  <rect class="card" x="80" y="305" width="190" height="95" />
  <text class="label" x="120" y="338">Source clusters</text>
  <text class="small" x="105" y="362">Counts by domain</text>
  <text class="small" x="116" y="382">and source ID</text>

  <rect class="accent" x="350" y="210" width="220" height="120" />
  <text class="label" x="392" y="244">Coverage review</text>
  <text class="small" x="382" y="268">Missing concepts</text>
  <text class="small" x="382" y="288">Primary sources</text>
  <text class="small" x="382" y="308">Dissenting evidence</text>

  <rect class="artifact" x="650" y="145" width="210" height="95" />
  <text class="label" x="703" y="178">Artifact</text>
  <text class="small" x="690" y="202">research_gaps.jsonl</text>
  <text class="small" x="697" y="222">for later audit</text>

  <rect class="accent" x="650" y="305" width="210" height="95" />
  <text class="label" x="688" y="338">Targeted queries</text>
  <text class="small" x="686" y="362">Broaden source mix</text>
  <text class="small" x="690" y="382">Verify claims</text>

  <rect class="card" x="930" y="225" width="150" height="90" />
  <text class="label" x="965" y="258">Next pass</text>
  <text class="small" x="962" y="282">Search, read,</text>
  <text class="small" x="965" y="302">summarize</text>

  <path class="thin" d="M270 192 C305 192 315 230 342 246" />
  <path class="thin" d="M270 352 C305 352 315 310 342 292" />
  <path class="arrow" d="M570 250 C608 228 615 200 642 192" />
  <path class="arrow" d="M570 294 C608 316 615 344 642 352" />
  <path class="arrow" d="M860 352 C890 352 900 280 922 270" />
  <path class="arrow" d="M1005 225 C1005 105 175 102 175 137" />
</svg>
