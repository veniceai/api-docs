<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Private research agent data boundaries</title>
  <desc id="desc">A boundary diagram showing which data stays local, which data is sent to search providers, and which data is sent to Venice API endpoints.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dd3300" />
    </marker>
    <style>
      .bg { fill: #fbfaf8; }
      .localZone { fill: #ffffff; stroke: #2f4858; stroke-width: 2.5; rx: 22; }
      .externalZone { fill: #fff7f3; stroke: #dd3300; stroke-width: 2.5; rx: 22; }
      .searchZone { fill: #f5f3ff; stroke: #7a6ff0; stroke-width: 2.5; rx: 22; }
      .card { fill: #ffffff; stroke: #c9d4da; stroke-width: 1.5; rx: 14; }
      .title { font: 700 22px Arial, sans-serif; fill: #241f1d; }
      .zoneTitle { font: 700 18px Arial, sans-serif; fill: #241f1d; }
      .label { font: 700 14px Arial, sans-serif; fill: #241f1d; }
      .small { font: 13px Arial, sans-serif; fill: #554a45; }
      .arrow { stroke: #dd3300; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .purple { stroke: #7a6ff0; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="560" rx="24" />
  <text class="title" x="40" y="48">Data Boundaries</text>
  <text class="small" x="40" y="76">The app is local, but search and model calls still leave your machine. Design provider choice around your privacy needs.</text>

  <rect class="localZone" x="40" y="120" width="320" height="360" />
  <text class="zoneTitle" x="64" y="155">Local machine</text>
  <rect class="card" x="70" y="185" width="260" height="60" />
  <text class="label" x="98" y="211">CLI configuration</text>
  <text class="small" x="98" y="232">Topic, model, depth, providers</text>
  <rect class="card" x="70" y="265" width="260" height="60" />
  <text class="label" x="98" y="291">Research state</text>
  <text class="small" x="98" y="312">Source notes and dedupe sets</text>
  <rect class="card" x="70" y="345" width="260" height="80" />
  <text class="label" x="98" y="371">Local outputs</text>
  <text class="small" x="98" y="392">Markdown report</text>
  <text class="small" x="98" y="412">JSONL artifacts</text>

  <rect class="searchZone" x="430" y="120" width="250" height="360" />
  <text class="zoneTitle" x="454" y="155">Search providers</text>
  <rect class="card" x="460" y="205" width="190" height="80" />
  <text class="label" x="500" y="231">DuckDuckGo</text>
  <text class="small" x="488" y="252">General web results</text>
  <rect class="card" x="460" y="320" width="190" height="80" />
  <text class="label" x="523" y="346">arXiv</text>
  <text class="small" x="494" y="367">Paper discovery</text>

  <rect class="externalZone" x="750" y="120" width="330" height="360" />
  <text class="zoneTitle" x="774" y="155">Venice API</text>
  <rect class="card" x="780" y="185" width="260" height="70" />
  <text class="label" x="808" y="211">Chat completions</text>
  <text class="small" x="808" y="232">Query planning, evidence, reports</text>
  <rect class="card" x="780" y="280" width="260" height="70" />
  <text class="label" x="808" y="306">Streaming chat</text>
  <text class="small" x="808" y="327">Long report generation</text>
  <rect class="card" x="780" y="375" width="260" height="70" />
  <text class="label" x="808" y="401">Scrape endpoint</text>
  <text class="small" x="808" y="422">Public URLs to Markdown</text>

  <path class="purple" d="M360 235 H422" />
  <text class="small" x="372" y="220">search queries</text>
  <path class="purple" d="M680 245 H742" />
  <text class="small" x="689" y="230">source URLs</text>
  <path class="arrow" d="M360 315 C520 315 600 220 742 220" />
  <text class="small" x="488" y="292">prompts and source chunks</text>
  <path class="arrow" d="M780 410 C600 505 330 505 230 430" />
  <text class="small" x="470" y="500">Markdown content, model responses</text>
</svg>
